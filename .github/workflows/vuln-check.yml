name: Vulnerability Scan

on: [push, pull_request]

permissions:
  security-events: write
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false # Avoids the "Duplicate header" conflict

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          check-latest: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false # Tells govulncheck NOT to try and checkout the code again
          output-format: sarif
          output-file: results.sarif

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
